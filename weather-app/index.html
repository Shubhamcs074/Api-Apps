<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyward — Weather, at a glance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1b2a;
    --paper:#f5f3ee;
    --dusk-1:#2c3e6b;
    --dusk-2:#f0a868;
    --day-1:#4a90d9;
    --day-2:#bfe3f5;
    --night-1:#0b1130;
    --night-2:#2a2f5c;
    --accent:#f0a868;
    --accent-2:#5fb3a3;
    --glass: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.22);
    --text-hi: #fbfaf7;
    --text-lo: rgba(251,250,247,0.68);
    --radius: 22px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; min-height:100vh;
    font-family:'Inter', sans-serif;
    color:var(--text-hi);
    background: linear-gradient(160deg, var(--day-1) 0%, var(--day-2) 55%, #eaf6fb 100%);
    transition: background 1.1s ease;
    overflow-x:hidden;
  }

  body.is-night{
    background: linear-gradient(160deg, var(--night-1) 0%, var(--night-2) 60%, #3a3f72 100%);
  }
  body.is-dusk{
    background: linear-gradient(160deg, var(--dusk-1) 0%, #6a5a8c 45%, var(--dusk-2) 100%);
  }

  .stars{
    position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity 1.2s ease;
  }
  body.is-night .stars{ opacity:1; }

  .wrap{
    max-width: 620px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position:relative;
    z-index:2;
  }

  header{
    text-align:left;
    margin-bottom: 36px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-lo);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom: 10px;
  }
  .eyebrow::before{
    content:'';
    width:7px; height:7px; border-radius:50%;
    background: var(--accent-2);
    box-shadow: 0 0 0 4px rgba(95,179,163,0.18);
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: clamp(34px, 7vw, 48px);
    line-height:1.02;
    margin: 0 0 8px;
    letter-spacing:-0.02em;
  }

  .tagline{
    color: var(--text-lo);
    font-size: 15px;
    max-width: 420px;
  }

  .search-row{
    display:flex;
    gap:10px;
    margin-top: 28px;
  }

  .search-row input{
    flex:1;
    padding: 15px 18px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(14px);
    color: var(--text-hi);
    font-family:'Inter', sans-serif;
    font-size: 15px;
    outline:none;
    transition: border-color .2s ease, background .2s ease;
  }
  .search-row input::placeholder{ color: var(--text-lo); }
  .search-row input:focus{
    border-color: var(--accent-2);
    background: rgba(255,255,255,0.16);
  }

  .search-row button{
    padding: 15px 22px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #241a0d;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 15px;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    white-space:nowrap;
  }
  .search-row button:hover{ transform: translateY(-1px); box-shadow: 0 8px 20px rgba(240,168,104,0.35); }
  .search-row button:active{ transform: translateY(0); }
  .search-row button:disabled{ opacity:0.6; cursor:default; transform:none; box-shadow:none; }

  .state-msg{
    margin-top: 18px;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-lo);
    min-height: 18px;
  }
  .state-msg.error{ color: #ffb4a2; }

  .card{
    margin-top: 30px;
    border-radius: var(--radius);
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(18px);
    padding: 30px;
    display:none;
    animation: rise .5s ease;
  }
  .card.visible{ display:block; }

  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .loc-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap: 16px;
  }

  .loc-name{
    font-family:'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight:600;
    margin:0;
  }
  .loc-sub{
    color: var(--text-lo);
    font-size: 13px;
    margin-top: 4px;
  }
  .loc-time{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-lo);
    text-align:right;
    white-space:nowrap;
  }

  .temp-block{
    display:flex;
    align-items:center;
    gap: 20px;
    margin: 22px 0 6px;
  }

  .temp-big{
    font-family:'Space Grotesk', sans-serif;
    font-size: 84px;
    font-weight:700;
    line-height:1;
    letter-spacing:-0.03em;
    cursor:pointer;
    user-select:none;
    position:relative;
  }
  .temp-big .unit{
    font-size: 34px;
    font-weight:500;
    vertical-align: 20px;
    opacity:0.75;
  }
  .temp-hint{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-lo);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:2px;
  }

  .cond{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .cond img{ width:52px; height:52px; }
  .cond-text{ font-size:16px; font-weight:500; }
  .feels{ color: var(--text-lo); font-size: 13px; margin-top:2px; }

  /* Signature element: horizon arc */
  .horizon{
    margin: 26px 0 8px;
    padding-top: 10px;
  }
  .horizon svg{ width:100%; height:auto; display:block; }
  .horizon-caption{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-lo);
    margin-top: 6px;
    letter-spacing:0.04em;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 26px;
  }
  .stat{
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.06);
    padding: 14px 14px 12px;
  }
  .stat-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color: var(--text-lo);
    margin-bottom: 6px;
  }
  .stat-value{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight:600;
  }
  .stat-value span{ font-size:12px; font-weight:400; color: var(--text-lo); }

  .aqi-row{
    margin-top: 14px;
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.06);
  }
  .aqi-dot{
    width:10px; height:10px; border-radius:50%;
    flex-shrink:0;
  }
  .aqi-label{ font-size:13px; color: var(--text-lo); }
  .aqi-value{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14px; margin-left:auto; }

  footer{
    text-align:center;
    margin-top: 46px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-lo);
    opacity:0.7;
  }

  @media (max-width:480px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
    .temp-big{ font-size:64px; }
    .search-row{ flex-direction:column; }
  }

  :focus-visible{ outline: 2px solid var(--accent-2); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<svg class="stars" id="stars"></svg>

<div class="wrap">
  <header>
    <div class="eyebrow" id="statusDot">Live conditions</div>
    <h1>Skyward</h1>
    <p class="tagline">Type a city, get the sky above it — temperature, air, wind, and where the sun sits right now.</p>

    <div class="search-row">
      <input type="text" id="cityInput" placeholder="Try “London” or “Jaipur”" autocomplete="off" />
      <button id="searchBtn">Check sky</button>
    </div>
    <div class="state-msg" id="stateMsg"></div>
  </header>

  <div class="card" id="card">
    <div class="loc-row">
      <div>
        <p class="loc-name" id="locName">—</p>
        <p class="loc-sub" id="locSub">—</p>
      </div>
      <div class="loc-time" id="locTime">—</div>
    </div>

    <div class="temp-block">
      <div class="temp-big" id="tempBig" title="Click to switch °C/°F">
        —<span class="unit" id="tempUnit">°C</span>
      </div>
      <div class="cond">
        <img id="condIcon" src="" alt="" />
        <div>
          <div class="cond-text" id="condText">—</div>
          <div class="feels" id="feelsText">—</div>
        </div>
      </div>
    </div>
    <div class="temp-hint">Tap the temperature to switch units</div>

    <div class="horizon">
      <svg id="horizonSvg" viewBox="0 0 560 130" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="horizon-caption">
        <span id="uvCaption">UV —</span>
        <span id="sunCaption">—</span>
      </div>
    </div>

    <div class="grid">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="statHumidity">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="statWind">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="statPressure">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="statVis">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Chance of rain</div>
        <div class="stat-value" id="statRain">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Cloud cover</div>
        <div class="stat-value" id="statCloud">—</div>
      </div>
    </div>

    <div class="aqi-row" id="aqiRow">
      <div class="aqi-dot" id="aqiDot"></div>
      <div class="aqi-label" id="aqiLabel">Air quality</div>
      <div class="aqi-value" id="aqiValue">—</div>
    </div>
  </div>

  <footer>Data via WeatherAPI.com</footer>
</div>

<script>
  // ---- Configuration ----
  const API_KEY = "7b66937a3ce14d4a99b122926260407";
  const API_URL = "https://api.weatherapi.com/v1/current.json";

  // ---- Elements ----
  const cityInput   = document.getElementById('cityInput');
  const searchBtn   = document.getElementById('searchBtn');
  const stateMsg    = document.getElementById('stateMsg');
  const card        = document.getElementById('card');
  const body        = document.body;

  let unit = 'c'; // 'c' or 'f'
  let lastData = null;

  // ---- Star field for night mode ----
  function buildStars(){
    const svg = document.getElementById('stars');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    let html = '';
    for(let i=0;i<70;i++){
      const x = Math.random()*100;
      const y = Math.random()*60;
      const r = (Math.random()*0.6+0.2).toFixed(2);
      const op = (Math.random()*0.6+0.3).toFixed(2);
      html += `<circle cx="${x}" cy="${y}" r="${r}" fill="#fff" opacity="${op}"/>`;
    }
    svg.innerHTML = html;
  }
  buildStars();

  // ---- Fetch weather ----
  async function fetchWeather(city){
    const url = `${API_URL}?key=${API_KEY}&q=${encodeURIComponent(city)}&aqi=yes`;
    const res = await fetch(url);
    if(!res.ok){
      let msg = 'Could not find that place. Check the spelling and try again.';
      try{
        const errBody = await res.json();
        if(errBody && errBody.error && errBody.error.message){
          msg = errBody.error.message;
        }
      }catch(e){ /* ignore parse errors, use default msg */ }
      throw new Error(msg);
    }
    return res.json();
  }

  function setLoading(isLoading){
    searchBtn.disabled = isLoading;
    searchBtn.textContent = isLoading ? 'Checking…' : 'Check sky';
  }

  function setMessage(text, isError){
    stateMsg.textContent = text || '';
    stateMsg.classList.toggle('error', !!isError);
  }

  // ---- Render ----
  function applyTheme(isDay){
    body.classList.remove('is-night','is-dusk');
    if(isDay === 0){
      body.classList.add('is-night');
    }
  }

  function aqiInfo(usEpaIndex){
    const table = {
      1: { label: 'Good', color:'#5fb3a3' },
      2: { label: 'Moderate', color:'#c9d15f' },
      3: { label: 'Unhealthy for sensitive groups', color:'#f0c868' },
      4: { label: 'Unhealthy', color:'#f0a868' },
      5: { label: 'Very unhealthy', color:'#e46a5f' },
      6: { label: 'Hazardous', color:'#b23a55' }
    };
    return table[usEpaIndex] || { label: 'Unknown', color:'#999' };
  }

  function drawHorizon(isDay, localHour, uv){
    // Simple day/night arc: sun travels along a semicircle, position by hour (rough model)
    const svg = document.getElementById('horizonSvg');
    const w = 560, h = 130;
    const cx = w/2, cy = 100, r = 90;

    // progress 0..1 across daylight hours (approx 6am-6pm) or night hours (6pm-6am)
    let progress;
    if(isDay === 1){
      progress = Math.min(Math.max((localHour - 6) / 12, 0), 1);
    } else {
      let h2 = localHour >= 18 ? localHour - 18 : localHour + 6;
      progress = Math.min(Math.max(h2 / 12, 0), 1);
    }
    const angle = Math.PI - (progress * Math.PI); // pi -> 0
    const sx = cx + r * Math.cos(angle);
    const sy = cy - r * Math.sin(angle);

    const sunColor = isDay ? '#f0a868' : '#dfe6f5';
    const trackColor = 'rgba(255,255,255,0.22)';
    const uvSize = uv ? Math.min(10 + uv*1.2, 22) : 12;

    svg.innerHTML = `
      <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${trackColor}" stroke-width="1.5" stroke-dasharray="3 5"/>
      <line x1="${cx-r-10}" y1="${cy}" x2="${cx+r+10}" y2="${cy}" stroke="${trackColor}" stroke-width="1.5"/>
      <circle cx="${sx}" cy="${sy}" r="${uvSize}" fill="${sunColor}" opacity="0.95"/>
      <circle cx="${sx}" cy="${sy}" r="${uvSize+9}" fill="${sunColor}" opacity="0.18"/>
    `;
  }

  function render(data){
    lastData = data;
    const loc = data.location;
    const cur = data.current;

    document.getElementById('locName').textContent = `${loc.name}, ${loc.country}`;
    document.getElementById('locSub').textContent = loc.region ? loc.region : loc.country;
    document.getElementById('locTime').textContent = loc.localtime;

    updateTempDisplay();

    document.getElementById('condIcon').src = 'https:' + cur.condition.icon;
    document.getElementById('condIcon').alt = cur.condition.text;
    document.getElementById('condText').textContent = cur.condition.text;
    const feelsC = cur.feelslike_c, feelsF = cur.feelslike_f;
    document.getElementById('feelsText').textContent = `Feels like ${unit === 'c' ? feelsC + '°' : feelsF + '°'}`;

    document.getElementById('statHumidity').innerHTML = `${cur.humidity}<span> %</span>`;
    document.getElementById('statWind').innerHTML = `${cur.wind_kph}<span> kph ${cur.wind_dir}</span>`;
    document.getElementById('statPressure').innerHTML = `${cur.pressure_mb}<span> mb</span>`;
    document.getElementById('statVis').innerHTML = `${cur.vis_km}<span> km</span>`;
    document.getElementById('statRain').innerHTML = `${cur.chance_of_rain}<span> %</span>`;
    document.getElementById('statCloud').innerHTML = `${cur.cloud}<span> %</span>`;

    if(cur.air_quality){
      const info = aqiInfo(cur.air_quality['us-epa-index']);
      document.getElementById('aqiDot').style.background = info.color;
      document.getElementById('aqiDot').style.boxShadow = `0 0 0 4px ${info.color}33`;
      document.getElementById('aqiValue').textContent = info.label;
      document.getElementById('aqiLabel').textContent = `Air quality · PM2.5 ${cur.air_quality.pm2_5.toFixed(1)}`;
      document.getElementById('aqiRow').style.display = 'flex';
    } else {
      document.getElementById('aqiRow').style.display = 'none';
    }

    applyTheme(cur.is_day);

    const localHour = parseInt(loc.localtime.split(' ')[1].split(':')[0], 10);
    drawHorizon(cur.is_day, localHour, cur.uv);
    document.getElementById('uvCaption').textContent = `UV ${cur.uv}`;
    document.getElementById('sunCaption').textContent = cur.is_day ? 'Daytime' : 'Nighttime';

    card.classList.add('visible');
  }

  function updateTempDisplay(){
    if(!lastData) return;
    const cur = lastData.current;
    const val = unit === 'c' ? cur.temp_c : cur.temp_f;
    document.getElementById('tempBig').innerHTML = `${val}<span class="unit" id="tempUnit">°${unit.toUpperCase()}</span>`;
    const feels = unit === 'c' ? cur.feelslike_c : cur.feelslike_f;
    document.getElementById('feelsText').textContent = `Feels like ${feels}°`;
  }

  document.getElementById('tempBig').addEventListener('click', () => {
    unit = unit === 'c' ? 'f' : 'c';
    updateTempDisplay();
  });

  // ---- Search flow ----
  async function runSearch(){
    const city = cityInput.value.trim();
    if(!city){
      setMessage('Type a city name first.', true);
      return;
    }
    setMessage('');
    setLoading(true);
    try{
      const data = await fetchWeather(city);
      render(data);
      setMessage('');
    }catch(err){
      setMessage(err.message || 'Something went wrong. Try again.', true);
      card.classList.remove('visible');
    }finally{
      setLoading(false);
    }
  }

  searchBtn.addEventListener('click', runSearch);
  cityInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') runSearch();
  });

  // Load a default city on first open
  cityInput.value = 'London';
  runSearch();
</script>

</body>
</html>
