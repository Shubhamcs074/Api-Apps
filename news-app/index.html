<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal — News, not noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161512;
    --paper:#f6f3ec;
    --paper-dim:#eeeade;
    --line: rgba(22,21,18,0.14);
    --accent:#a13d2f;
    --accent-2:#2f5c4a;
    --muted: #6f6a5e;
    --card-bg:#ffffff;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family:'Inter', sans-serif;
  }

  .wrap{
    max-width: 900px;
    margin:0 auto;
    padding: 40px 22px 90px;
  }

  header{
    border-bottom: 3px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 26px;
  }

  .masthead-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap: 10px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: clamp(36px, 7vw, 52px);
    margin:0;
    letter-spacing:-0.01em;
  }
  h1 .dot{ color: var(--accent); }

  .date-line{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size: 15px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Signal/noise meter — signature element */
  .meter-row{
    display:flex;
    align-items:center;
    gap: 14px;
    margin-top: 18px;
  }
  .meter-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--muted);
    white-space:nowrap;
  }
  .meter-track{
    flex:1;
    height:6px;
    background: var(--line);
    border-radius: 3px;
    overflow:hidden;
    position:relative;
  }
  .meter-fill{
    height:100%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    width: 0%;
    transition: width .5s ease;
  }
  .meter-count{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    white-space:nowrap;
  }

  /* Controls */
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap: 10px;
    margin: 22px 0 6px;
  }

  .search-box{
    flex: 1 1 260px;
    display:flex;
    border: 2px solid var(--ink);
    background: var(--card-bg);
  }
  .search-box input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    padding: 12px 14px;
    font-family:'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
  }
  .search-box button{
    border:none;
    background: var(--ink);
    color: var(--paper);
    padding: 0 20px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    cursor:pointer;
  }
  .search-box button:hover{ background: var(--accent); }
  .search-box button:disabled{ opacity:0.6; cursor:default; }

  select{
    border: 2px solid var(--ink);
    background: var(--card-bg);
    color: var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    padding: 0 10px;
    cursor:pointer;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin: 14px 0 4px;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--card-bg);
    cursor:pointer;
    color: var(--muted);
    transition: all .15s ease;
  }
  .chip:hover{ border-color: var(--ink); color: var(--ink); }
  .chip.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .state-msg{
    margin-top: 16px;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
  }
  .state-msg.error{ color: var(--accent); }

  .results-meta{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin: 22px 0 14px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  .feed{
    display:flex;
    flex-direction:column;
    gap: 22px;
  }

  .card{
    background: var(--card-bg);
    border: 1px solid var(--line);
    display:flex;
    gap: 18px;
    padding: 18px;
    text-decoration:none;
    color: inherit;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(22,21,18,0.10);
    border-color: var(--ink);
  }
  .card-img{
    width: 150px;
    height: 110px;
    flex-shrink:0;
    object-fit:cover;
    background: var(--paper-dim);
  }
  .card-body{
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .card-source{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color: var(--accent-2);
    margin-bottom: 6px;
  }
  .card-title{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 19px;
    line-height:1.25;
    margin: 0 0 6px;
  }
  .card-desc{
    font-size: 13.5px;
    color: var(--muted);
    line-height:1.45;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-meta{
    margin-top: auto;
    padding-top: 8px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  @media (max-width: 560px){
    .card{ flex-direction:column; }
    .card-img{ width:100%; height:160px; }
  }

  footer{
    text-align:center;
    margin-top: 50px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  :focus-visible{ outline: 2px solid var(--accent); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="masthead-row">
      <h1>The Signal<span class="dot">.</span></h1>
      <div class="date-line" id="dateLine">—</div>
    </div>
    <p class="tagline">News worth your attention, filtered from everything competing for it.</p>

    <div class="meter-row">
      <span class="meter-label">Signal</span>
      <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
      <span class="meter-label">Noise</span>
      <span class="meter-count" id="meterCount">—</span>
    </div>
  </header>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="queryInput" placeholder="Search a topic, company, or keyword…" autocomplete="off" />
      <button id="searchBtn">Search</button>
    </div>
    <select id="sortSelect" title="Sort by">
      <option value="publishedAt">Newest</option>
      <option value="popularity">Popularity</option>
      <option value="relevancy">Relevancy</option>
    </select>
  </div>

  <div class="chips" id="chips">
    <div class="chip active" data-topic="technology">Technology</div>
    <div class="chip" data-topic="business">Business</div>
    <div class="chip" data-topic="science">Science</div>
    <div class="chip" data-topic="health">Health</div>
    <div class="chip" data-topic="climate">Climate</div>
    <div class="chip" data-topic="sports">Sports</div>
  </div>

  <div class="state-msg" id="stateMsg"></div>
  <div class="results-meta" id="resultsMeta" style="display:none;"></div>

  <div class="feed" id="feed"></div>

  <footer>Data via NewsAPI.org — headlines link out to the original publisher.</footer>
</div>

<script>
  // ---- Configuration ----
  const API_KEY = "7b7db99a1e684d4b88aefb1f095c19be";
  const API_URL = "https://newsapi.org/v2/everything";

  const queryInput   = document.getElementById('queryInput');
  const searchBtn    = document.getElementById('searchBtn');
  const sortSelect   = document.getElementById('sortSelect');
  const chips        = document.querySelectorAll('.chip');
  const stateMsg     = document.getElementById('stateMsg');
  const resultsMeta  = document.getElementById('resultsMeta');
  const feed         = document.getElementById('feed');
  const meterFill    = document.getElementById('meterFill');
  const meterCount   = document.getElementById('meterCount');
  const dateLine     = document.getElementById('dateLine');

  dateLine.textContent = new Date().toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  function setActiveChip(el){
    chips.forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
  }

  function setLoading(isLoading){
    searchBtn.disabled = isLoading;
    searchBtn.textContent = isLoading ? '…' : 'Search';
  }

  function setMessage(text, isError){
    stateMsg.textContent = text || '';
    stateMsg.classList.toggle('error', !!isError);
  }

  function timeAgo(iso){
    const diffMs = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  function updateMeter(articlesShown, totalResults){
    // "Signal" ratio: articles with real images+descriptions vs total fetched (rough proxy for quality/noise)
    if (!articlesShown.length){
      meterFill.style.width = '0%';
      meterCount.textContent = '—';
      return;
    }
    const withSubstance = articlesShown.filter(a => a.urlToImage && a.description && a.description.length > 20).length;
    const pct = Math.round((withSubstance / articlesShown.length) * 100);
    meterFill.style.width = pct + '%';
    meterCount.textContent = `${totalResults.toLocaleString()} results`;
  }

  function renderArticles(articles){
    feed.innerHTML = '';
    if (!articles.length){
      feed.innerHTML = '<p style="color:var(--muted); font-family:JetBrains Mono, monospace; font-size:13px;">No articles found. Try a different search.</p>';
      return;
    }
    articles.forEach(a => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = a.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const img = a.urlToImage
        ? `<img class="card-img" src="${a.urlToImage}" alt="" onerror="this.style.display='none'">`
        : '';

      card.innerHTML = `
        ${img}
        <div class="card-body">
          <div class="card-source">${a.source && a.source.name ? a.source.name : 'Unknown source'}</div>
          <h2 class="card-title">${a.title || 'Untitled'}</h2>
          <p class="card-desc">${a.description || ''}</p>
          <div class="card-meta">${a.publishedAt ? timeAgo(a.publishedAt) : ''}${a.author ? ' · ' + a.author : ''}</div>
        </div>
      `;
      feed.appendChild(card);
    });
  }

  async function fetchNews(query, sortBy){
    const params = new URLSearchParams({
      q: query,
      sortBy: sortBy,
      language: 'en',
      pageSize: '20',
      apiKey: API_KEY
    });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    if (data.status !== 'ok'){
      if (data.code === 'corsNotAllowed'){
        throw new Error('NewsAPI\'s free plan blocks browser requests from anywhere except localhost. Run this file through a local server (e.g. "localhost") rather than opening it directly, or use a paid plan / backend proxy for production.');
      }
      throw new Error(data.message || 'Something went wrong fetching the news.');
    }
    return data;
  }

  async function runSearch(topicOverride){
    const query = topicOverride || queryInput.value.trim() || 'technology';
    if (topicOverride) queryInput.value = '';
    const sortBy = sortSelect.value;

    setMessage('');
    setLoading(true);
    try{
      const data = await fetchNews(query, sortBy);
      renderArticles(data.articles);
      updateMeter(data.articles, data.totalResults);
      resultsMeta.style.display = 'block';
      resultsMeta.textContent = `${data.totalResults.toLocaleString()} results for "${query}" · showing ${data.articles.length}`;
      setMessage('');
    }catch(err){
      setMessage(err.message, true);
      feed.innerHTML = '';
      resultsMeta.style.display = 'none';
      updateMeter([], 0);
    }finally{
      setLoading(false);
    }
  }

  searchBtn.addEventListener('click', () => { setActiveChip(null); runSearch(); });
  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter'){ setActiveChip(null); runSearch(); }
  });
  sortSelect.addEventListener('change', () => runSearch(queryInput.value.trim() || undefined));

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      setActiveChip(chip);
      runSearch(chip.dataset.topic);
    });
  });

  // Initial load
  runSearch('technology');
</script>

</body>
</html>
