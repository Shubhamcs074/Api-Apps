<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:#111; color:#f5f3ee;
    font-family:'Inter', sans-serif;
  }
  .wrap{ max-width:520px; padding:40px 24px; text-align:center; }
  h1{ font-family:'Space Grotesk', sans-serif; font-size:32px; margin-bottom:8px; }
  p{ color:#9a9689; margin-bottom:32px; }
  .links{ display:flex; flex-direction:column; gap:14px; }
  a.card{
    display:block; padding:18px 20px; border-radius:14px;
    background:#1c1c1c; border:1px solid #2c2c2c;
    color:#f5f3ee; text-decoration:none; font-weight:500;
    transition: border-color .15s ease, transform .15s ease;
  }
  a.card:hover{ border-color:#5fb3a3; transform: translateY(-2px); }
  a.card .sub{ display:block; font-size:12px; color:#9a9689; margin-top:4px; font-weight:400; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Demo Apps</h1>
    <p>Two small single-page apps, built with plain HTML/CSS/JS.</p>
    <div class="links">
      <a class="card" href="./weather-app/">Skyward — Weather app<span class="sub">Live conditions via WeatherAPI.com</span></a>
      <a class="card" href="./news-app/">The Signal — News app<span class="sub">Headlines via NewsAPI.org</span></a>
    </div>
  </div>
</body>
</html>
